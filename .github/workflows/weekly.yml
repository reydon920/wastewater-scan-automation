name: Weekly Wastewater Export

on:
  schedule:
    - cron: '0 6 * * 1'        # every Monday 06:00 UTC
  workflow_dispatch:           # manual "Run workflow" button

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run exporter
        env:
          # Optional: set once you find the real endpoint from the first
          # run's logs, then hard-code it here for reliability.
          WWS_API_URL:   ''
          WWS_EMAIL:      ${{ vars.WWS_EMAIL }}
          WWS_SMTP_USER:  ${{ secrets.SMTP_USER }}
          WWS_SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          WWS_EMAIL_TO:   ${{ secrets.EMAIL_TO }}
        run: python wastewater-fetch.py

      - name: Commit CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*.csv
          git commit -m "chore: weekly wastewater export $(date -u +%F)" || echo "nothing to commit"
          git push
